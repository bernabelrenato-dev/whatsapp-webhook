version: '3'

services:
  db:
    image: postgres:15-alpine
    container_name: jgis-postgres
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
      # Montar el script de inicialización para crear la base de datos de Chatwoot
      - ./scripts/database/create-multiple-databases.sql:/docker-entrypoint-initdb.d/create-multiple-databases.sql
    environment:
      - POSTGRES_DB=typebot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    container_name: jgis-redis
    restart: always
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: jgis-mailhog
    restart: always
    ports:
      - '8025:8025' # Interfaz Web
      - '1025:1025' # SMTP

  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-builder
    restart: always
    depends_on:
      - db
      - mailhog
    ports:
      - '8081:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/typebot
      - NEXTAUTH_URL=http://localhost:8081
      - NEXT_PUBLIC_VIEWER_URL=http://localhost:8082
      - ENCRYPTION_SECRET=supersecretkey123456789012345678
      - DISABLE_SIGNUP=false
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USERNAME=test
      - SMTP_PASSWORD=test
      - NEXT_PUBLIC_SMTP_FROM=no-reply@jgispublicidad.pe
      - SSRF_ALLOWED_HOSTS=host.docker.internal

  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    restart: always
    depends_on:
      - db
    ports:
      - '8082:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/typebot
      - NEXTAUTH_URL=http://localhost:8081
      - NEXT_PUBLIC_VIEWER_URL=http://localhost:8082
      - ENCRYPTION_SECRET=supersecretkey123456789012345678
      - SSRF_ALLOWED_HOSTS=host.docker.internal

  chatwoot-web:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-web
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    restart: always
    depends_on:
      - db
      - redis
      - mailhog
    ports:
      - '3010:3000'
    volumes:
      - chatwoot_storage:/app/storage
    environment:
      - SECRET_KEY_BASE=a_super_secret_key_base_for_jgis_123_xyz
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=primary_key_for_rails_jgis_production
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=deterministic_key_for_rails_jgis_prod
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=salt_for_rails_jgis_production_key
      - RAILS_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=chatwoot_production
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost:3010
      - SMTP_ADDRESS=mailhog
      - SMTP_PORT=1025
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=false
      - SMTP_OPENSSL_VERIFY_MODE=none
      - SMTP_USER_NAME=test
      - SMTP_PASSWORD=test
      - SMTP_DOMAIN=jgispublicidad.pe
      - MAILER_SENDER_EMAIL=no-reply@jgispublicidad.pe

  chatwoot-worker:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-worker
    command: bundle exec sidekiq -C config/sidekiq.yml
    restart: always
    depends_on:
      - db
      - redis
      - mailhog
    volumes:
      - chatwoot_storage:/app/storage
    environment:
      - SECRET_KEY_BASE=a_super_secret_key_base_for_jgis_123_xyz
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=primary_key_for_rails_jgis_production
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=deterministic_key_for_rails_jgis_prod
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=salt_for_rails_jgis_production_key
      - RAILS_ENV=production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=chatwoot_production
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - SMTP_ADDRESS=mailhog
      - SMTP_PORT=1025
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=false
      - SMTP_OPENSSL_VERIFY_MODE=none
      - SMTP_USER_NAME=test
      - SMTP_PASSWORD=test
      - SMTP_DOMAIN=jgispublicidad.pe
      - MAILER_SENDER_EMAIL=no-reply@jgispublicidad.pe

  webhook:
    build: .
    container_name: jgis-webhook
    restart: always
    depends_on:
      - db
    ports:
      - '3005:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/typebot
      - PORT=3000
      - NODE_ENV=production

volumes:
  db_data:
  redis_data:
  chatwoot_storage:
