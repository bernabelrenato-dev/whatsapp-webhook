# Propuesta de Configuración Nginx — Deploy Webhook
# ============================================================
# IMPORTANTE: Este archivo es solo una PROPUESTA.
# Según las reglas CogSec (Sección 0.2 del PROMPT_MAESTRO),
# la edición de Nginx se ejecuta MANUALMENTE por el usuario.
# ============================================================
#
# Agregar este bloque location dentro del server block de
# bot.jgispublicidad.pe en /etc/nginx/sites-available/
#
# El deployer escucha en el puerto 9000 internamente.
# Solo acepta POST con firma HMAC válida de GitHub.

# --- COPIAR DENTRO DEL server { ... } DE bot.jgispublicidad.pe ---

location /deploy-webhook {
    # Solo permitir POST desde GitHub
    limit_except POST {
        deny all;
    }

    proxy_pass http://localhost:9000;
    proxy_http_version 1.1;

    # Headers necesarios para la validación HMAC
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pasar los headers de GitHub tal cual
    proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
    proxy_set_header X-GitHub-Event $http_x_github_event;
    proxy_set_header X-GitHub-Delivery $http_x_github_delivery;

    proxy_cache_bypass $http_upgrade;
}
